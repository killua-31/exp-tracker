services:
  - type: web
    name: fintrack-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -m app.seed
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./fintrack.db
      - key: CORS_ORIGINS
        value: "*"
      - key: DEFAULT_CURRENCY
        value: CAD
      - key: PYTHON_VERSION
        value: 3.11.0
